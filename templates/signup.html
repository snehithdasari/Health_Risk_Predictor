{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-140px)] py-10">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">Create an Account</h2>
            <p class="text-slate-500 mt-2">Join VitalRisk Insight today</p>
        </div>

        <form method="POST" action="{{ url_for('signup') }}" class="space-y-4">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-regular fa-user"></i>
                    </div>
                    <input type="text" id="username" name="username" required class="form-input pl-10 w-full" placeholder="johndoe">
                </div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                    <input type="email" id="email" name="email" required class="form-input pl-10 w-full" placeholder="you@example.com">
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <input type="password" id="password" name="password" required class="form-input pl-10 w-full" placeholder="Create a strong password">
                </div>
            </div>

            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <input type="password" id="confirm_password" name="confirm_password" required class="form-input pl-10 w-full" placeholder="Repeat your password">
                </div>
            </div>

            <button type="submit" class="btn-primary w-full py-3 rounded-lg font-semibold mt-8 transition-transform hover:-translate-y-0.5 shadow-sm">
                Sign Up
            </button>
        </form>

        <p class="text-center mt-6 text-slate-500 text-sm">
            Already have an account? <a href="{{ url_for('login') }}" class="text-indigo-600 font-medium hover:text-indigo-700">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
